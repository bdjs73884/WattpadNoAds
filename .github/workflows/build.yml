name: Build WattpadNoAds (Custom iOS 26 SDK)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Theos
        uses: actions/cache@v4
        with:
          path: theos
          key: ${{ runner.os }}-theos-${{ hashFiles('Makefile', '.github/workflows/*.yml') }}
          restore-keys: |
            ${{ runner.os }}-theos-

      - name: Setup Theos with custom SDK repo
        uses: Randomblock1/theos-action@v1
        with:
          orion: 'false'
          theos-dir: 'theos'
          theos-src: 'https://github.com/theos/theos'
          theos-sdks: 'https://github.com/xybp888/iOS-SDKs'
          theos-sdks-branch: 'master'

      - name: Show installed SDKs
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          ls -la "$THEOS/sdks"

      - name: Verify iOS 26 SDK exists
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          test -d "$THEOS/sdks/iPhoneOS26.0.sdk" || \
          test -d "$THEOS/sdks/iPhoneOS26.1.sdk" || \
          test -d "$THEOS/sdks/iPhoneOS26.2.sdk" || \
          test -d "$THEOS/sdks/iPhoneOS26.3.sdk" || \
          test -d "$THEOS/sdks/iPhoneOS26.4.sdk"

      - name: Build the tweak
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          make clean
          make package FINALPACKAGE=1

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: WattpadNoAds-Deb
          path: packages/*.deb