name: Build WattpadNoAds

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode 26.4
        run: |
          sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer
          xcodebuild -version
          xcode-select -p

      - name: Cache Theos
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/theos
          key: ${{ runner.os }}-theos-${{ hashFiles('Makefile', '.github/workflows/*.yml') }}
          restore-keys: |
            ${{ runner.os }}-theos-

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1
        with:
          orion: 'false'
          theos-dir: '${{ github.workspace }}/theos'
          theos-src: 'https://github.com/theos/theos'
          theos-sdks: 'https://github.com/theos/sdks'
          theos-sdks-branch: 'master'

      - name: Set THEOS env
        run: echo "THEOS=${{ github.workspace }}/theos" >> $GITHUB_ENV

      - name: Build
        run: |
          gmake clean
          gmake package FINALPACKAGE=1

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: WattpadNoAds-Deb
          path: packages/*.deb