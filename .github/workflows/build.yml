name: Build WattpadNoAds (Custom iOS 26 SDK)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Theos
        uses: actions/cache@v4
        with:
          path: theos
          key: ${{ runner.os }}-theos-${{ hashFiles('Makefile', '.github/workflows/*.yml') }}
          restore-keys: |
            ${{ runner.os }}-theos-

      - name: Setup Theos with custom SDK repo
        uses: Randomblock1/theos-action@v1
        with:
          orion: 'false'
          theos-dir: 'theos'
          theos-src: 'https://github.com/theos/theos'
          theos-sdks: 'https://github.com/YOUR_USERNAME/YOUR_IOS_SDKS_REPO'
          theos-sdks-branch: 'main'

      - name: Show installed SDKs
        run: |
          echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV
          ls -la "$GITHUB_WORKSPACE/theos/sdks"

      - name: Verify iOS 26 SDK exists
        run: |
          if [ -d "$GITHUB_WORKSPACE/theos/sdks/iPhoneOS26.0.sdk" ]; then
            echo "Found iPhoneOS26.0.sdk"
          elif [ -d "$GITHUB_WORKSPACE/theos/sdks/iPhoneOS26.1.sdk" ]; then
            echo "Found iPhoneOS26.1.sdk"
          elif [ -d "$GITHUB_WORKSPACE/theos/sdks/iPhoneOS26.2.sdk" ]; then
            echo "Found iPhoneOS26.2.sdk"
          else
            echo "ERROR: No iOS 26 SDK found in the custom SDK repo."
            exit 1
          fi

      - name: Build the tweak
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          make clean
          make package FINALPACKAGE=1

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: WattpadNoAds-Deb
          path: packages/*.deb