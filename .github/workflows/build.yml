name: Build WattpadNoAds (iOS 26 SDK fixed)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Theos
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/theos
          key: ${{ runner.os }}-theos-${{ hashFiles('Makefile', '.github/workflows/*.yml') }}
          restore-keys: |
            ${{ runner.os }}-theos-

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1
        with:
          orion: 'false'
          theos-dir: '${{ github.workspace }}/theos'
          theos-src: 'https://github.com/theos/theos'
          theos-sdks: 'https://github.com/theos/sdks'
          theos-sdks-branch: 'master'

      - name: Set THEOS env
        run: echo "THEOS=${{ github.workspace }}/theos" >> $GITHUB_ENV

      - name: Fetch only iPhoneOS26.4.sdk
        run: |
          rm -rf sdkrepo
          git clone --filter=blob:none --no-checkout https://github.com/xybp888/iOS-SDKs.git sdkrepo
          cd sdkrepo
          git sparse-checkout init --cone
          git sparse-checkout set iPhoneOS26.4.sdk
          git checkout master
          cd ..

          mkdir -p "$THEOS/sdks"
          rm -rf "$THEOS/sdks"/iPhoneOS26*.sdk
          cp -R sdkrepo/iPhoneOS26.4.sdk "$THEOS/sdks/"

      - name: Show installed SDKs
        run: |
          ls -la "$THEOS/sdks"

      - name: Verify iOS 26 SDK exists
        run: |
          test -d "$THEOS/sdks/iPhoneOS26.4.sdk"

      - name: Build the tweak
        run: |
          gmake clean
          gmake package FINALPACKAGE=1

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: WattpadNoAds-Deb
          path: packages/*.deb